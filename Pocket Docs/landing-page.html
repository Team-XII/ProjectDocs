<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Construction App</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f1f3f5;
      color: #1f2933;
      padding-bottom: 92px;
    }

    /* ===== HEADER ===== */
    header {
      background: #ffffff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo-space {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1.5px dashed #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      background: #fafafa;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: #fafafa;
      font-size: 14px;
    }

    /* ===== MAIN ===== */
    main {
      padding: 24px 18px;
    }

    .welcome {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .welcome-sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .icon-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 22px 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .icon-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
    }

    .icon-placeholder {
      width: 52px;
      height: 52px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1.5px dashed #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #6b7280;
      background: #f9fafb;
    }

    .icon-card a {
      text-decoration: none;
      font-weight: 600;
      color: #111827;
      font-size: 15px;
    }

    /* ===== FOOTER ===== */
    .footer-popup {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      padding: 10px 0 12px;
    }

    .footer-icons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      text-align: center;
    }

    .footer-item {
      font-size: 11px;
      color: #374151;
    }

    .footer-icon {
      width: 30px;
      height: 30px;
      margin: 0 auto 6px;
      border-radius: 8px;
      border: 1.5px dashed #9ca3af;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #6b7280;
      background: #f9fafb;
    }

    .footer-item a {
      text-decoration: none;
      color: #374151;
      font-weight: 500;
    }
    .app-header {
  background: #ffffff;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #e5e7eb;
  flex-wrap: wrap;
}

.search-wrapper {
  flex: 1 1 100%;
}

.search-wrapper input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  background: #fafafa;
  font-size: 14px;
}

.logout-link {
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  color: #374151;
  margin-left: auto;
}
.logo-img {
  width: 140px;
  height: 140px;
}

/* ===== TABLET & DESKTOP ===== */
@media (min-width: 640px) {
  .search-wrapper {
    flex: 1;
  }
}


    /* ===== DESKTOP ===== */
    @media (min-width: 768px) {
      main {
        max-width: 1100px;
        margin: auto;
      }

      .icon-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
<header class="app-header">
  <div class="logo-space">
    <img src="/img/2.png" alt="" class="logo-img">
  </div>

  <div class="search-wrapper">
    <input
      type="text"
      placeholder="Search projects, tools, documents..."
    />
  </div>

</header>
  <!-- MAIN -->
  <main>
    <div class="welcome">Welcome back</div>
    <div class="welcome-sub">
      Manage your construction projects, teams, and documents efficiently
    </div>

    <div class="icon-grid">
      <div class="icon-card">
        <div class="icon-placeholder">Icon</div>
        <a href="#">Link</a>
      </div>
      <div class="icon-card">
        <div class="icon-placeholder">Icon</div>
        <a href="#">Link</a>
      </div>
      <div class="icon-card">
        <div class="icon-placeholder">Icon</div>
        <a href="#">Link</a>
      </div>
      <div class="icon-card">
        <div class="icon-placeholder">Icon</div>
        <a href="#">Link</a>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <div class="footer-popup">
    <div class="footer-icons">
      <div class="footer-item">
        <div class="footer-icon">I</div>
        <a href="#">Link</a>
      </div>
      <div class="footer-item">
        <div class="footer-icon">I</div>
        <a href="#">Link</a>
      </div>
      <div class="footer-item">
        <div class="footer-icon">I</div>
        <a href="#">Link</a>
      </div>
      <div class="footer-item">
        <div class="footer-icon">I</div>
        <a href="#">Link</a>
      </div>
      <div class="footer-item">
        <div class="footer-icon">I</div>
        <a href="login.html">Logout</a>
      </div>
    </div>
  </div>

</body>
</html>
