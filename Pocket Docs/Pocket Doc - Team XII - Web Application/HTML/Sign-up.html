<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Docs Sign Up</title>
  <link rel="stylesheet" href="/CSS/Styles.css">
</head>
<body>
  <div class="signup-container">
    <!-- Logo -->
    <div class="logo">
      <img src="/Icons/2 (1).png" alt="Pocket Docs Logo">
    </div>

    <!-- Header -->
    <div class="signup-header">
      <h1>Create Your Pocket Docs Account</h1>
      <p>Sign up to access your professional documents and manage your work efficiently.</p>
    </div>

    <!-- Sign Up Form -->
    <form class="signup-form">
      <div class="input-group">
        <input type="text" placeholder="First Name" required>
      </div>

      <div class="input-group">
        <input type="text" placeholder="Last Name" required>
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <input type="tel" placeholder="Phone Number" required>
      </div>

      <div class="input-group">
        <select required>
          <option value="" disabled selected>Select Category</option>
          <option>Option 1</option>
          <option>Option 2</option>
          <option>Option 3</option>
          <option>Option 4</option>
          <option>Option 5</option>
          <option>Option 6</option>
          <option>Option 7</option>
          <option>Option 8</option>
          <option>Option 9</option>
        </select>
      </div>

      <!-- Sign Up Button -->
      <button type="submit" class="btn-signup">Sign Up</button>

      <!-- Bottom Login Link -->
      <div class="bottom-link">
        <p>Already have an account? <a href="/HTML/Login.html">Login</a></p>
      </div>
    </form>
  </div>
</body>
</html>
