<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="login.css" />
  <title>Pocket Docs Sign Up</title>
</head>
<body>

  <div class="login-container">
    <h1>Create your Pocket Docs account</h1>
    <p class="subtitle">
      Securely manage and organize your important documents
    </p>

    <!-- Name -->
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" placeholder="Enter your first name" />

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" placeholder="Enter your last name" />

    <!-- Contact -->
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" />

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter your phone number" />

    <!-- Password -->
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Create a password" />

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm password" />

    <!-- Account Type -->
    <label for="accountType">Account Type</label>
    <select id="accountType">
      <option value="">Select Proffesion</option>
      <option>Construction</option>
      <option>Education</option>
      <option>Legal</option>
      <option>Marketing</option>
      <option>Planner</option>
    </select>

    

    <!-- Region -->
    <label for="country">Country / Region</label>
    <select id="country">
      <option value="">Select your country</option>
      <option>Ireland</option>
      <option>United Kingdom</option>
      <option>United States</option>
      <option>Other</option>
    </select>

    <!-- Terms -->
    <div class="terms">
      <input type="checkbox" id="terms" />
      <label for="terms">
        I agree to the Terms of Service and Privacy Policy
      </label>
    </div>

    <button class="login-btn">Create Account</button>

    <div class="signup-text">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

</body>
</html>
