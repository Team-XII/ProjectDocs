<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
  <title>Pocket Docks Login</title>
</head>
<body>

  <div class="login-container">
  
    <button class="offline-btn">Offline Mode</button>

    <h1>Welcome back to Pocket Docs</h1>
    <p class="subtitle">
      Sign in to access your professional documents and continue your work
    </p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" />

    <a href="landing-page.html"><button class="login-btn">Login</button></a>

    <div class="divider">Continue with</div>

    <button class="google-btn">Sign up with Google</button>

    <div class="signup-text">
      Don’t have an account? <a href="Sign-in-page.html">Sign up here</a>
    </div>
  </div>

</body>
</html>
