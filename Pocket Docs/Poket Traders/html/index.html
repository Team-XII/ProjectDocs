<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pocket Gas Engineer - Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-card">
        <!-- Logo / App Name -->
        <h1>Pocket Docs</h1>

        <!-- Email input -->
        <div class="input-group">
            <span class="input-icon">
                <img class="icon-mail-login-size" src="/icons/email (2).svg" alt="Email Icon">
            </span>
            <input type="email" placeholder="Email">
        </div>

        <!-- Password input with eye toggle -->
        <div class="input-group password-group">
            <span class="input-icon">
                <img class="icon-lock-login-size" src="/icons/padlock (1).svg" alt="Password Icon">
            </span>
            <input type="password" placeholder="Password" id="password">
            <span class="password-toggle">
                <img src="/icons/show.svg" alt="Toggle Password" class="eye-icon" id="togglePassword">
            </span>
        </div>

        <!-- Primary login button -->
        <button class="primary-btn">Login</button>

        <!-- Divider -->
        <div class="divider">OR</div>

        <!-- Social login buttons -->
        <button class="social-btn social-google">
            <img src="/icons/search (2).png" alt="Google Logo" class="apple-google">
            Sign in with Google
        </button>

        <button class="social-btn social-apple">
            <img src="/icons/apple.svg" alt="Apple Logo" class="apple-google">
            Sign in with Apple
        </button>
    </div>

    <script src="/js/eyeToggle.js"></script>
</body>
</html>
